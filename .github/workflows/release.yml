name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Test (headless)
        run: xvfb-run -a npm test

      - name: Package
        run: npm run package

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/copilot-adapter-*.vsix
          generate_release_notes: true

      # To publish to VS Code Marketplace, add VSCE_PAT to repository secrets
      # and uncomment the step below. PAT must have Marketplace → Manage scope.
      # Obtain a PAT from https://dev.azure.com (requires Azure DevOps org).
      #
      # - name: Publish to VS Code Marketplace
      #   env:
      #     VSCE_PAT: ${{ secrets.VSCE_PAT }}
      #   run: npx vsce publish --pat "$VSCE_PAT"
